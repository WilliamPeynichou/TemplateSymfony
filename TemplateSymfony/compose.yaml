
services:
  php:
    build:
      context: ./symfony-docker
      target: frankenphp_dev
    restart: unless-stopped
    environment:
      SERVER_NAME: ${SERVER_NAME:-http://localhost}, http://php
      DATABASE_URL: mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-Andfield}@database:3306/${MYSQL_DATABASE:-bddAndfield}?serverVersion=8.0&charset=utf8mb4
      AGENT_SECRET: ${AGENT_SECRET:?AGENT_SECRET is required}
      AGENT_INTERNAL_SECRET: ${AGENT_INTERNAL_SECRET:?AGENT_INTERNAL_SECRET is required}
    volumes:
      - ./:/app
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    depends_on:
      - database

###> doctrine/doctrine-bundle ###
  database:
    image: mysql:8
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bddAndfield}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Andfield}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Andfield}
    volumes:
      - database_data:/var/lib/mysql

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    # Démarre ollama serve + télécharge qwen3:1.7b si absent
    entrypoint:
      - /bin/bash
      - -c
      - |
        ollama serve &
        SERVER_PID=$$!
        echo 'Attente demarrage Ollama...'
        until curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; do sleep 1; done
        echo 'Ollama pret - pull qwen3:1.7b si absent'
        ollama pull qwen3:1.7b
        echo 'Modele charge !'
        wait $$SERVER_PID
    restart: unless-stopped

  agent:
    build: ./agent
    environment:
      - LLM_BASE_URL=http://ollama:11434/v1
      - LLM_MODEL=qwen3:1.7b
      - SYMFONY_API_URL=http://php/api/v1
      - AGENT_SECRET=${AGENT_SECRET:?AGENT_SECRET is required}
      - AGENT_INTERNAL_SECRET=${AGENT_INTERNAL_SECRET:?AGENT_INTERNAL_SECRET is required}
    depends_on:
      - ollama
      - php
    restart: unless-stopped

volumes:
  database_data:
  caddy_data:
  caddy_config:
  ollama_data:
###< doctrine/doctrine-bundle ###
