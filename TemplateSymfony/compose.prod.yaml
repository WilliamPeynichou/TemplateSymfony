# Overlay production : `docker compose -f compose.yaml -f compose.prod.yaml up -d`
# Ne bind-mount jamais le code en prod, healthchecks stricts, restart auto.

services:
  php:
    restart: always
    build:
      context: ./symfony-docker
      target: frankenphp_prod
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  database:
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER:-app}", "-p${MYSQL_PASSWORD:-Andfield}"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  agent:
    restart: always
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001", "--workers", "2"]
    environment:
      - AGENT_ENV=prod
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8001/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
